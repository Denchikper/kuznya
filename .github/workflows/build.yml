# Кузня — генератор паролей
# by Benovich · https://github.com/Denchikper/password_generator

name: build

# Право на запись нужно tauri-action, чтобы создавать релиз по тегу
permissions:
  contents: write

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Установка зависимостей
        run: npm ci

      - name: Тесты Rust
        run: cargo test
        working-directory: src-tauri

      - name: Сборка приложения
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # Релиз создаётся только при пуше тега v*
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Кузня {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Артефакты сборки
        uses: actions/upload-artifact@v4
        with:
          name: kuznya-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
          if-no-files-found: warn
