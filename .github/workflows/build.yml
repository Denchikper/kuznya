# Кузня — генератор паролей
# by Benovich · https://github.com/Denchikper/kuznya

name: build

# Право на запись нужно tauri-action, чтобы создавать релиз по тегу
permissions:
  contents: write

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Установка зависимостей
        run: npm ci

      - name: Тесты Rust
        run: cargo test
        working-directory: src-tauri

      - name: Сборка приложения
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # Релиз создаётся только при пуше тега v*
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Кузня {0}', github.ref_name) || '' }}
          releaseDraft: true

      # Кириллица из productName выпадает из имён файлов при загрузке
      # в релиз («_2.0.0_universal.dmg») — даём ассетам понятные имена.
      # Обновляемый .app.tar.gz не раздаём — удаляем из релиза.
      - name: Понятные имена файлов релиза
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          ver="${TAG#v}"
          rel=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          gh api "repos/$GITHUB_REPOSITORY/releases/$rel/assets" --paginate \
            --jq '.[] | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r id name; do
            case "$name" in
              *.tar.gz*) gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$id"; continue ;;
              *.dmg) new="Kuznya_${ver}_macOS_universal.dmg" ;;
              *-setup.exe) new="Kuznya_${ver}_Windows_x64-setup.exe" ;;
              *.msi) new="Kuznya_${ver}_Windows_x64.msi" ;;
              *) continue ;;
            esac
            [ "$name" = "$new" ] || gh api -X PATCH \
              "repos/$GITHUB_REPOSITORY/releases/assets/$id" -f name="$new"
          done

      # Собираем установщики в плоскую папку, чтобы в артефакте
      # были сразу готовые файлы, а не дерево каталогов target/
      - name: Подготовка артефактов
        shell: bash
        run: |
          mkdir -p installers
          find src-tauri/target -path "*/release/bundle/*" \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) \
            -exec cp {} installers/ \;
          ls -la installers/

      - name: Артефакты сборки
        uses: actions/upload-artifact@v4
        with:
          name: kuznya-${{ matrix.platform }}
          path: installers/*
          if-no-files-found: warn
